<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>車輛碰撞模擬</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: min(96vw, 900px);
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 8px;
      z-index: 10;
    }
    #controls button {
      background: #444;
      color: #eee;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    #controls button:hover { background: #666; }
    #frame-display { font-size: 14px; min-width: 80px; text-align: center; }
    #frame-slider { width: 240px; accent-color: #88aaff; }
    #playback-speed {
      background: #444;
      color: #eee;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 14px;
    }

    #legend {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.8;
      z-index: 10;
    }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    #speed-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
    }
    #speed-panel .panel-title {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }
    .speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .speed-row span:first-child {
      width: 52px;
      color: #ccc;
      flex-shrink: 0;
    }
    .speed-row input[type=range] {
      flex: 1;
      accent-color: #88aaff;
    }
    .speed-val {
      width: 60px;
      text-align: right;
      color: #88aaff;
      font-weight: bold;
    }
    #ref-speeds { font-size: 11px; color: #999; }
    #verdict { font-size: 12px; line-height: 1.5; min-height: 18px; }
    #btn-solve {
      background: #445a44;
      color: #dfe;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: monospace;
      align-self: flex-start;
    }
    #btn-solve:hover { background: #567056; }
    #solve-result { font-size: 12px; line-height: 1.7; color: #cfe8cf; }

    @media (max-width: 640px) {
      #speed-panel { top: auto; bottom: 150px; left: 8px; right: 8px; min-width: 0; }
      #legend { top: 8px; right: 8px; font-size: 11px; padding: 6px 8px; }
      #controls { bottom: 8px; left: 8px; right: 8px; transform: none;
                  flex-wrap: wrap; justify-content: center; gap: 8px; }
      #frame-slider { width: 100%; order: 9; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <button id="btn-play">▶ 播放</button>
    <button id="btn-reset">↺ 重置</button>
    <button id="btn-topdown">⊙ 頂視圖</button>
    <button id="btn-persp">◇ 45°</button>
    <button id="btn-chase">🚗 跟車</button>
    <select id="playback-speed">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
    </select>
    <input id="frame-slider" type="range" min="1" max="89" value="1" step="1" />
    <span id="frame-display">Frame 1</span>
  </div>

  <div id="speed-panel">
    <div class="panel-title">碰撞前車速調整（實錄剖面倍率）</div>
    <div class="speed-row">
      <span id="collider0-name">—</span>
      <input id="collider0-speed" type="range" min="0.25" max="2.5" step="0.05" value="1" />
      <span id="collider0-speed-label" class="speed-val">×1.00</span>
    </div>
    <div class="speed-row">
      <span id="collider1-name">—</span>
      <input id="collider1-speed" type="range" min="0.25" max="2.5" step="0.05" value="1" />
      <span id="collider1-speed-label" class="speed-val">×1.00</span>
    </div>
    <div id="ref-speeds"></div>
    <div id="verdict"></div>
    <button id="btn-solve">⚖ 求安全車速</button>
    <div id="solve-result"></div>
  </div>

  <div id="legend"></div>

  <!-- Three.js r165（本地 vendor，離線可用） -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>

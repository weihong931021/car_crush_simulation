# Postprocess defaults for TrafficLab trajectory JSON.
#
# The Python script reads this file automatically when it is next to
# postprocess.py. CLI flags can still override these values for experiments.

target_classes:
  - motor
  - motorcycle
  - two_wheeler
  - Two_Wheeler

repair:
  # Current implemented stage: sharp turn / short reversal interpolation.
  # This is now considered a secondary repair stage. The next primary stage
  # should be direction_correction below.
  min_track_points: 8
  sharp_turn_angle_deg: 130.0
  min_step_px: 0.5
  min_lateral_deviation_px: 0.0
  bridge_gap: 1
  max_bad_segment_len: 8

direction_correction:
  # Planned primary stage. Estimate long-term/piecewise motion direction and
  # project excessive lateral motion back toward the trajectory corridor.
  enabled: true
  centerline_mode: global_pca
  window_size: 15
  min_points: 8
  max_angle_from_axis_deg: 18.0
  max_lateral_offset_px: 2.0
  lateral_retention: 0.05
  preserve_longitudinal_progress: true
  max_correction_px: 16.0

outlier_detection:
  # Planned next stage. Keep pixel-based defaults first because JSON output may
  # not always contain reliable px_per_m for physical-unit checks.
  enabled: true
  max_step_px: null
  max_accel_px_per_frame2: 8.0
  max_turn_angle_deg: 150.0
  min_step_px_for_turn: 0.5
  max_invalid_segment_len: 8

  # Use these only when fps and px_per_m are available.
  physical:
    enabled: false
    max_speed_kmh: 130.0
    max_accel_kmh_per_s: 150.0
    speed_turn_rules:
      - min_speed_kmh: 50.0
        max_turn_angle_deg: 20.0
      - min_speed_kmh: 30.0
        max_turn_angle_deg: 35.0

savgol:
  # Planned next stage. Disabled by default until outlier repair is stable,
  # because S-G smoothing spreads remaining outliers into nearby frames.
  enabled: false
  window_length: 9
  polyorder: 2
  target_field: sat_coords
  update_sat_center: true
  preserve_endpoints: true
  min_track_points: 9
  keep_debug_field: true

visual_bspline:
  # Implemented stage: write visual_sat_coords without overwriting sat_coords.
  enabled: true
  min_points: 8
  degree: 3
  smooth_px: 2.0
  preserve_endpoints: true

output:
  normalize_for_traffic_trajectory_smooth: true
  add_frame_id: true
  add_timestamp_from_fps: true
  sync_sat_center: true
